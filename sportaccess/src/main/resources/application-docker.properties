# ──────────────────────────────────────────────────
# Perfil Docker – sobreescribe application.properties
# ──────────────────────────────────────────────────

# Base de datos: usa el hostname del servicio docker-compose
spring.datasource.url=jdbc:mysql://db:3306/sportaccess?createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}

# Firebase: ruta al fichero montado en el contenedor
firebase.config.path=${FIREBASE_CONFIG_PATH:}

# CORS: en Docker se permite el frontend en el mismo host
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8081}
