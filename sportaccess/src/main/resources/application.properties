spring.application.name=sportaccess-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sportaccess?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin

# Firebase Configuration (To be filled with actual credentials)
# firebase.config.path=classpath:firebase-service-account.json

# Stripe Configuration (To be filled with actual keys)
# stripe.api.key=sk_test_...

# Server Configuration
server.port=8080

# OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
