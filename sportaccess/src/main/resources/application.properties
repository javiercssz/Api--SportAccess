spring.application.name=sportaccess-backend

# ──────────────────────────────────────────────────
# Base de datos
# ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sportaccess?createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ──────────────────────────────────────────────────
# Firebase (dejar vacío en local sin credenciales)
# Para producción: classpath:firebase-service-account.json
# ──────────────────────────────────────────────────
firebase.config.path=

# ──────────────────────────────────────────────────
# Stripe (dejar vacío en local sin cuentas)
# ──────────────────────────────────────────────────
# stripe.api.key=sk_test_...

# ──────────────────────────────────────────────────
# CORS (orígenes permitidos, separados por coma)
# ──────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:8081

# ──────────────────────────────────────────────────
# Servidor
# ──────────────────────────────────────────────────
server.port=8080

# ──────────────────────────────────────────────────
# Swagger / OpenAPI
# ──────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
