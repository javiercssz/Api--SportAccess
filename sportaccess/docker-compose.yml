services:

  app:
    build: .
    container_name: sportaccess-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/sportaccess?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      FIREBASE_CONFIG_PATH: ${FIREBASE_CONFIG_PATH:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8081}
    volumes:
      # Montar el fichero de credenciales Firebase (opcional)
      - ${FIREBASE_CONFIG_PATH:-/dev/null}:${FIREBASE_CONFIG_PATH:-/dev/null}:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sportaccess-network

  db:
    image: mysql:8.0
    container_name: sportaccess-db
    restart: always
    environment:
      MYSQL_DATABASE: sportaccess
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-admin}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s
    volumes:
      - sportaccess_prod_db:/var/lib/mysql
    networks:
      - sportaccess-network

volumes:
  sportaccess_prod_db:

networks:
  sportaccess-network:
    driver: bridge
